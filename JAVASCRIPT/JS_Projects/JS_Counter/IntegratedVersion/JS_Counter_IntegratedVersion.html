<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
  </head>
  <body>
    <h1>Oi!</h1>
    <p>Counter!</p>
    <p id="coelho" style="font-size:45px;">0</p>

    <button onclick="increaseCount()">+</button>
    <button onclick="decreaseCount()">-</button>
    <button onclick="resetCount()">RESET</button>

    <script>
    let count = 0;

    function updateCount() {
      document.getElementById("coelho").innerHTML = count;
    }

    function increaseCount() {
      if (count > 99) {
        count = 99;
      } else {
        count++;
      }

      updateCount();
    }

    function decreaseCount() {
      if (count < 0 ) {
        count = 0;
      } else {
        count--;
      }

      updateCount();
    }

    function resetCount() {
      count = 0;
      updateCount();
    }
    </script>
  </body>
</html>
